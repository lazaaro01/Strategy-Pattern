spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://localhost:5432/notifications
    username: postgres
    password: 123455
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

notification:
  queue: notification.queue
  exchange: notification.exchange
  routing-key: notification.routingKey